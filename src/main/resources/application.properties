spring.application.name=investimento

spring.datasource.url=jdbc:postgresql://localhost:5432/banco_investimento
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# JWT (usado no módulo de Autenticação)
jwt.secret=${JWT_SECRET:troque-este-valor-por-um-segredo-forte-de-producao}

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# brapi.dev (cotações da B3) ---
# Sem token, só funcionam PETR4, VALE3, MGLU3, ITUB4.
# (criar conta em brapi.dev/dashboard), até 15.000 requisições/mês.
brapi.token=${BRAPI_TOKEN:}

# Wallet Service (módulo de saldo/conta corrente)
wallet.service.url=${WALLET_SERVICE_URL:http://localhost:8081}
