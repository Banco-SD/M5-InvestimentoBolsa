spring.application.name=investimento

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# JWT (usado no módulo de Autenticação)
jwt.secret=${JWT_SECRET}

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}

# brapi.dev (cotações da B3) ---
# Sem token, só funcionam PETR4, VALE3, MGLU3, ITUB4.
# (criar conta em brapi.dev/dashboard), até 15.000 requisições/mês.
brapi.token=${BRAPI_TOKEN}

# Wallet Service (módulo de saldo/conta corrente)
wallet.service.url=${WALLET_SERVICE_URL}
